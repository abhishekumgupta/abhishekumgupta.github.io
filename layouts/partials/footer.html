<script>
  window.addEventListener('load', function() {
    if (typeof window.goatcounter === 'undefined' || !window.goatcounter.visit_count) return;
    var p = encodeURIComponent(location.pathname || '/');
    var r = new XMLHttpRequest();
    r.open('GET', 'https://abhishekumgupta.goatcounter.com/counter/' + p + '.json');
    r.onload = function() {
      if (r.status === 200) {
        try {
          var data = JSON.parse(r.responseText);
          document.getElementById('gc-count').textContent = data.count_unique || data.count;
          document.getElementById('gc-wrapper').style.display = 'inline';
        } catch(e) {}
      }
    };
    r.send();
  });
</script>
